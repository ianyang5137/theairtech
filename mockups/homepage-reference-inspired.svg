      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1A1A1A" flood-opacity="0.08"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1A1A1A" flood-opacity="0.07"/>
    </filter>
    <clipPath id="heroClip">
      <rect x="885" y="250" width="425" height="345" rx="28"/>
    </clipPath>
    <clipPath id="galleryA">
      <rect x="105" y="1450" width="390" height="250" rx="22"/>
    </clipPath>
    <clipPath id="galleryB">
      <rect x="525" y="1450" width="390" height="250" rx="22"/>
    </clipPath>
    <clipPath id="galleryC">
      <rect x="945" y="1450" width="390" height="250" rx="22"/>
    </clipPath>
  </defs>

  <rect width="1440" height="2350" fill="#F5F5F6"/>

  <rect x="0" y="0" width="1440" height="42" fill="#111111"/>
  <text x="110" y="27" fill="#FFFFFF" font-size="15" font-family="Arial, Helvetica, sans-serif">Need help? support@theairtech.co.nz</text>
  <text x="1140" y="27" fill="#FFFFFF" font-size="15" font-family="Arial, Helvetica, sans-serif">021 463 788</text>
  <text x="1260" y="27" fill="#FFFFFF" font-size="15" font-family="Arial, Helvetica, sans-serif">Mon-Sat 8am-6pm</text>

  <rect x="0" y="42" width="1440" height="118" fill="#FFFFFF"/>
  <image href="../images/logo.png" x="98" y="58" width="325" height="82" preserveAspectRatio="xMinYMin meet"/>
  <rect x="470" y="66" width="520" height="54" rx="27" fill="#F3F3F4" stroke="#E3E3E6"/>
  <text x="515" y="100" fill="#8A8A91" font-size="18" font-family="Arial, Helvetica, sans-serif">Search service type, appliance, or problem...</text>
  <circle cx="959" cy="93" r="18" fill="#E21B38"/>
  <text x="953" y="100" fill="#FFFFFF" font-size="18" font-family="Arial, Helvetica, sans-serif">⌕</text>

  <text x="1045" y="100" fill="#222222" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="700">Book Now</text>
  <text x="1158" y="100" fill="#222222" font-size="18" font-family="Arial, Helvetica, sans-serif">Services</text>
  <text x="1260" y="100" fill="#222222" font-size="18" font-family="Arial, Helvetica, sans-serif">Contact</text>
  <rect x="1310" y="74" width="78" height="38" rx="19" fill="#E21B38"/>
  <text x="1332" y="99" fill="#FFFFFF" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700">中文</text>

  <rect x="0" y="160" width="1440" height="56" fill="#FFFFFF" stroke="#ECECEF"/>
  <text x="110" y="195" fill="#202020" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Air Conditioning</text>
  <text x="310" y="195" fill="#202020" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Fridge &amp; Freezer</text>
  <text x="530" y="195" fill="#202020" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Washing Machines</text>
  <text x="760" y="195" fill="#202020" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Dishwashers</text>
  <text x="930" y="195" fill="#202020" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Commercial Refrigeration</text>
  <text x="1225" y="195" fill="#202020" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">All Services</text>

  <rect x="85" y="250" width="1270" height="420" rx="28" fill="#FFFFFF" filter="url(#softShadow)"/>
  <text x="125" y="312" fill="#E21B38" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="700">AUCKLAND APPLIANCE REPAIR</text>
  <text x="125" y="392" fill="#141414" font-size="60" font-family="Arial, Helvetica, sans-serif" font-weight="800">
    <tspan x="125" dy="0">Fast service for the</tspan>
    <tspan x="125" dy="72">appliances people rely on.</tspan>
  </text>
  <text x="125" y="502" fill="#5F5F66" font-size="24" font-family="Arial, Helvetica, sans-serif">
    <tspan x="125" dy="0">A more reference-inspired direction: clean white surfaces, stronger structure,</tspan>
    <tspan x="125" dy="34">search-first layout, red accents, and a practical service catalog feel.</tspan>
  </text>

  <rect x="125" y="560" width="205" height="58" rx="29" fill="#E21B38"/>
  <text x="173" y="596" fill="#FFFFFF" font-size="21" font-family="Arial, Helvetica, sans-serif" font-weight="700">Book a Repair</text>
  <rect x="345" y="560" width="172" height="58" rx="29" fill="#111111"/>
  <text x="394" y="596" fill="#FFFFFF" font-size="21" font-family="Arial, Helvetica, sans-serif" font-weight="700">Call Now</text>

  <rect x="560" y="547" width="122" height="46" rx="23" fill="#F4F4F6" stroke="#E7E7EB"/>
  <text x="590" y="576" fill="#2B2B2B" font-size="18" font-family="Arial, Helvetica, sans-serif">Same-day</text>
  <rect x="695" y="547" width="176" height="46" rx="23" fill="#F4F4F6" stroke="#E7E7EB"/>
  <text x="724" y="576" fill="#2B2B2B" font-size="18" font-family="Arial, Helvetica, sans-serif">Home &amp; Commercial</text>

  <g clip-path="url(#heroClip)">
    <image href="../images/11.jpg" x="880" y="245" width="440" height="360" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <rect x="920" y="545" width="150" height="38" rx="19" fill="#111111"/>
  <text x="953" y="569" fill="#FFFFFF" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700">Trusted Service</text>
  <rect x="1085" y="545" width="176" height="38" rx="19" fill="#E21B38"/>
  <text x="1126" y="569" fill="#FFFFFF" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700">Auckland Wide</text>

  <text x="85" y="755" fill="#1A1A1A" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="800">Popular service categories</text>
  <text x="85" y="790" fill="#6A6A72" font-size="20" font-family="Arial, Helvetica, sans-serif">Structured like the reference site, but adapted for a repair business instead of spare parts.</text>

  <rect x="85" y="830" width="295" height="205" rx="22" fill="#FFFFFF" filter="url(#smallShadow)"/>
  <rect x="85" y="830" width="295" height="8" rx="4" fill="#E21B38"/>
  <text x="115" y="885" fill="#191919" font-size="29" font-family="Arial, Helvetica, sans-serif" font-weight="800">Air Conditioning</text>
  <text x="115" y="930" fill="#64646B" font-size="18" font-family="Arial, Helvetica, sans-serif">
    <tspan x="115" dy="0">Installations, cooling faults,</tspan>
    <tspan x="115" dy="28">drainage issues, and servicing.</tspan>
  </text>
  <text x="115" y="1003" fill="#E21B38" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Explore service →</text>

  <rect x="410" y="830" width="295" height="205" rx="22" fill="#FFFFFF" filter="url(#smallShadow)"/>
  <rect x="410" y="830" width="295" height="8" rx="4" fill="#E21B38"/>
  <text x="440" y="885" fill="#191919" font-size="29" font-family="Arial, Helvetica, sans-serif" font-weight="800">Fridge &amp; Freezer</text>
  <text x="440" y="930" fill="#64646B" font-size="18" font-family="Arial, Helvetica, sans-serif">
    <tspan x="440" dy="0">Cooling loss, noise, leaks,</tspan>
    <tspan x="440" dy="28">ice build-up, and controls.</tspan>
  </text>
  <text x="440" y="1003" fill="#E21B38" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Explore service →</text>

  <rect x="735" y="830" width="295" height="205" rx="22" fill="#FFFFFF" filter="url(#smallShadow)"/>
  <rect x="735" y="830" width="295" height="8" rx="4" fill="#E21B38"/>
  <text x="765" y="885" fill="#191919" font-size="29" font-family="Arial, Helvetica, sans-serif" font-weight="800">Laundry Appliances</text>
  <text x="765" y="930" fill="#64646B" font-size="18" font-family="Arial, Helvetica, sans-serif">
    <tspan x="765" dy="0">Washing machines, dryers,</tspan>
    <tspan x="765" dy="28">drainage, spin, and heating faults.</tspan>
  </text>
  <text x="765" y="1003" fill="#E21B38" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Explore service →</text>

  <rect x="1060" y="830" width="295" height="205" rx="22" fill="#FFFFFF" filter="url(#smallShadow)"/>
  <rect x="1060" y="830" width="295" height="8" rx="4" fill="#E21B38"/>
  <text x="1090" y="885" fill="#191919" font-size="27" font-family="Arial, Helvetica, sans-serif" font-weight="800">Commercial Refrigeration</text>
  <text x="1090" y="930" fill="#64646B" font-size="18" font-family="Arial, Helvetica, sans-serif">
    <tspan x="1090" dy="0">Display cabinets, coolers,</tspan>
    <tspan x="1090" dy="28">shop systems, and urgent support.</tspan>
  </text>
  <text x="1090" y="1003" fill="#E21B38" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Explore service →</text>

  <rect x="85" y="1090" width="1270" height="265" rx="26" fill="#111111"/>
  <text x="120" y="1152" fill="#FFFFFF" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="800">Search-like shortcut area</text>
  <text x="120" y="1188" fill="#FFFFFF" fill-opacity="0.72" font-size="20" font-family="Arial, Helvetica, sans-serif">This mirrors the reference site's category-driven feeling, but for service intents.</text>

  <rect x="120" y="1230" width="190" height="46" rx="23" fill="#2A2A2D"/>
  <text x="162" y="1259" fill="#FFFFFF" font-size="18" font-family="Arial, Helvetica, sans-serif">Not cooling</text>
  <rect x="326" y="1230" width="176" height="46" rx="23" fill="#2A2A2D"/>
  <text x="366" y="1259" fill="#FFFFFF" font-size="18" font-family="Arial, Helvetica, sans-serif">Water leaking</text>
  <rect x="518" y="1230" width="165" height="46" rx="23" fill="#2A2A2D"/>
  <text x="560" y="1259" fill="#FFFFFF" font-size="18" font-family="Arial, Helvetica, sans-serif">Making noise</text>
  <rect x="699" y="1230" width="205" height="46" rx="23" fill="#E21B38"/>
  <text x="744" y="1259" fill="#FFFFFF" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="700">Won't start</text>
  <rect x="920" y="1230" width="188" height="46" rx="23" fill="#2A2A2D"/>
  <text x="955" y="1259" fill="#FFFFFF" font-size="18" font-family="Arial, Helvetica, sans-serif">Door seal issue</text>
  <rect x="1124" y="1230" width="170" height="46" rx="23" fill="#2A2A2D"/>
  <text x="1164" y="1259" fill="#FFFFFF" font-size="18" font-family="Arial, Helvetica, sans-serif">Need install</text>

  <text x="85" y="1412" fill="#1A1A1A" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="800">Recent work gallery</text>
  <g clip-path="url(#galleryA)">
    <image href="../images/9.jpg" x="90" y="1430" width="430" height="290" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <g clip-path="url(#galleryB)">
    <image href="../images/4.jpg" x="510" y="1430" width="430" height="290" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <g clip-path="url(#galleryC)">
    <image href="../images/gree.jpg" x="930" y="1430" width="430" height="290" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <rect x="105" y="1640" width="390" height="60" fill="#FFFFFF" fill-opacity="0.92"/>
  <rect x="525" y="1640" width="390" height="60" fill="#FFFFFF" fill-opacity="0.92"/>
  <rect x="945" y="1640" width="390" height="60" fill="#FFFFFF" fill-opacity="0.92"/>
  <text x="130" y="1678" fill="#181818" font-size="21" font-family="Arial, Helvetica, sans-serif" font-weight="700">Air Conditioner Installation</text>
  <text x="550" y="1678" fill="#181818" font-size="21" font-family="Arial, Helvetica, sans-serif" font-weight="700">Dishwasher Repair</text>
  <text x="970" y="1678" fill="#181818" font-size="21" font-family="Arial, Helvetica, sans-serif" font-weight="700">Commercial Cooling Service</text>

  <rect x="85" y="1770" width="1270" height="240" rx="26" fill="#FFFFFF" filter="url(#smallShadow)"/>
  <text x="120" y="1835" fill="#1A1A1A" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="800">Why this version feels closer to the reference</text>
  <text x="120" y="1885" fill="#66666D" font-size="21" font-family="Arial, Helvetica, sans-serif">
    <tspan x="120" dy="0">1. Strong top utility bar and search bar</tspan>
    <tspan x="120" dy="34">2. Category-first layout with compact cards</tspan>
    <tspan x="120" dy="34">3. White content surfaces with red action accents</tspan>
    <tspan x="120" dy="34">4. More practical, retail-like trust and navigation structure</tspan>
  </text>

  <rect x="0" y="2080" width="1440" height="210" fill="#FFFFFF" stroke="#ECECEF"/>
  <text x="105" y="2142" fill="#151515" font-size="33" font-family="Arial, Helvetica, sans-serif" font-weight="800">Ready to apply this direction?</text>
  <text x="105" y="2180" fill="#696971" font-size="21" font-family="Arial, Helvetica, sans-serif">We can keep this layout language but tune it for your repair brand and bilingual audience.</text>
  <rect x="1030" y="2120" width="185" height="58" rx="29" fill="#E21B38"/>
  <text x="1082" y="2156" fill="#FFFFFF" font-size="21" font-family="Arial, Helvetica, sans-serif" font-weight="700">Use This Style</text>
  <rect x="1230" y="2120" width="110" height="58" rx="29" fill="#111111"/>
  <text x="1265" y="2156" fill="#FFFFFF" font-size="21" font-family="Arial, Helvetica, sans-serif" font-weight="700">Compare</text>
</svg>
